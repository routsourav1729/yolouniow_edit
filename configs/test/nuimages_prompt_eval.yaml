# Text-Visual Alignment Probe — nuOWODB (nuImages-based OWOD)
#
# 17 classes across T1 (base, 10 vehicles) + T2 (novel, 7 pedestrians).
# T3 classes are not part of the OWOD evaluation we care about and are excluded.
# gt_alias MUST match the dotted nuScenes annotation names exactly.
# 3 prompts per class: plain label → synonym → descriptive noun phrase.

experiment_tag: nuowodb_auroc_v1

# ── Model + checkpoints ──────────────────────────────────────────────────────
model_config: configs/owod_ft/yolo_uniow_l_lora_bn_1e-3_40e_8gpus_owod_nuowodb_t2.py
checkpoint:   work_dirs/yolo_uniow_l_lora_bn_1e-3_20e_8gpus_owod_nuowodb_train_task2_10shot_seed1/best_owod_Both_epoch_10.pth

text_encoder_pretrain_ckpt: pretrained/yolo_uniow_l_lora_bn_5e-4_100e_8gpus_obj365v1_goldg_train_lvis_minival.pth
text_encoder_model_name:    openai/clip-vit-base-patch32
text_encoder_use_lora:      true

# ── Data ─────────────────────────────────────────────────────────────────────
split:         test
num_images:    0
iou_threshold: 0.5

# ── Inference perf ───────────────────────────────────────────────────────────
batch_size:    16
num_workers:   12
amp:           true

# ── Test classes ─────────────────────────────────────────────────────────────
# Prompts = default class name + 3 selected discriminative attributes
# (from results/attributes/nuowodb/selected_top3_lambda0.7.json, job 115524).
# T1 — base (10 vehicle classes)
# Attributes only — no classname. Selected by all-vs-all AUROC (job 115686).
test_classes:
  - name: bicycle
    prompts: "handlebar stem assembly, chainring near pedals, slender front fork"
    gt_alias: ["vehicle.bicycle"]

  - name: motorcycle
    prompts: "motor bike, sportbike, motorbike"
    gt_alias: ["vehicle.motorcycle"]

  - name: car
    prompts: "four side doors, sedan side glazing, smooth bumper fascia"
    gt_alias: ["vehicle.car"]

  - name: bus_bendy
    prompts: "articulated bus, extended transit bus, two segment cabin"
    gt_alias: ["vehicle.bus.bendy"]

  - name: bus_rigid
    prompts: "school bus, large side windows, destination display panel"
    gt_alias: ["vehicle.bus.rigid"]

  - name: truck
    prompts: "truck, pickup truck, delivery truck"
    gt_alias: ["vehicle.truck"]

  - name: ambulance
    prompts: "emergency van, rescue van, paramedic van"
    gt_alias: ["vehicle.emergency.ambulance"]

  - name: police_car
    prompts: "marked police car, patrol sedan, police car"
    gt_alias: ["vehicle.emergency.police"]

  - name: construction_vehicle
    prompts: "site work attachment, backhoe loader, bulldozer"
    gt_alias: ["vehicle.construction"]

  - name: trailer
    prompts: "semi trailer, container trailer, box trailer"
    gt_alias: ["vehicle.trailer"]

  - name: adult_pedestrian
    prompts: "upright walking posture, unassisted walking stance, long stride posture"
    gt_alias: ["human.pedestrian.adult"]

  - name: child_pedestrian
    prompts: "toddler, short leg proportions, child"
    gt_alias: ["human.pedestrian.child"]

  - name: wheelchair_user
    prompts: "occupied wheelchair, wheelchair, seated wheelchair"
    gt_alias: ["human.pedestrian.wheelchair"]

  - name: stroller
    prompts: "stroller, folding stroller, baby pram"
    gt_alias: ["human.pedestrian.stroller"]

  - name: personal_mobility
    prompts: "standing scooter, single front stem, hoverboard"
    gt_alias: ["human.pedestrian.personal_mobility"]

  - name: police_officer
    prompts: "dark uniform trousers, police uniform shirt, official shoulder patches"
    gt_alias: ["human.pedestrian.police_officer"]

  - name: construction_worker
    prompts: "construction safety vest, safety workwear outfit, bright work vest"
    gt_alias: ["human.pedestrian.construction_worker"]
